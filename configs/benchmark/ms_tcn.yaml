# MS-TCN benchmark experiment config (Farha & Gall, CVPR 2019).
# Design reference: docs/benchmark/MS_TCN_DESIGN.md

experiment:
  name: ms_tcn_benchmark
  tier: B2
  registry_name: ms_tcn
  status: implemented
  seeds: [42, 123, 456]

reference_hardware:
  gpu: NVIDIA GeForce RTX 4090
  device: cuda
  precision: fp32
  use_amp: false
  batch_size_policy: >
    Fixed before all seeds. On OOM: stop, report, choose one new batch size,
    restart all three seeds. Do not mix results across batch sizes.

paths:
  use_reproduction_paths: true

dataset:
  adapter: frame_sequence
  labels_csv: master_frame_labels.csv
  keypoints_dir: keypoints
  use_z: true
  use_visibility: false
  features_per_frame: 99
  num_landmarks: 33

split:
  strategy: athlete_level
  source: athlete_split.json

ontology:
  id: seven_phase_v1
  num_supervised_classes: 7
  ignore_label_id: 0

model:
  name: ms_tcn
  input_layout: frame_sequence
  output_layout: frame_sequence
  num_stages: 4          # paper Sec. 3.4
  num_layers: 10         # paper Sec. 3.4 / Sec. 4.7
  num_f_maps: 64         # paper Sec. 3.4
  kernel_size: 3         # paper Sec. 3.1
  dropout: 0.5           # author release default; rate not in paper (see MS_TCN_DESIGN.md D8)

loss:
  tmse_weight: 0.15      # paper lambda, Sec. 3.4
  tmse_truncate_tau: 4   # paper tau, Sec. 3.4

optimizer:
  name: adam
  learning_rate: 0.0005  # paper Sec. 3.4
  weight_decay: 0.0      # not in paper; author release Adam default

scheduler:
  name: none

training:
  batch_size: 1            # variable-length videos; author release convention
  epochs: 50               # paper Sec. 4.9 (50Salads training reference)
  device: cuda             # reference: RTX 4090; fails fast if CUDA unavailable
  class_weighting: true     # SnatchPhaseBench deviation D3
  standardize: train_only    # SnatchPhaseBench deviation D2
  use_amp: false            # fp32 canonical benchmark; AMP is a separate experiment
  early_stopping:
    monitor: val_segmental_f1_at_50
    patience: 15
    rationale: >
      Validation segment F1@IoU=0.50 is computed each epoch via the canonical
      segment evaluator on dense val predictions (see MS_TCN_M3_PROTOCOL.md).
      Frame macro-F1 remains logged but is not used for checkpoint selection.
  trainer: ms_tcn_trainer

evaluation:
  levels:
    - frame
    - segment
    - boundary
  primary_metrics:
    - boundary_mae_frames
    - segmental_f1_at_50
    - edit_score
  use_b0_mapping: false

output:
  checkpoint_dir: outputs/benchmark/ms_tcn
  predictions_dir: outputs/benchmark/ms_tcn/predictions
  reports_dir: outputs/benchmark/ms_tcn/reports
  tensorboard_dir: outputs/benchmark/ms_tcn/tensorboard

expected:
  implementation_status: implemented
