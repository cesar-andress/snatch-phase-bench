# SnatchPhaseBench canonical benchmark manifest (contract for all experiments).
# Version bumps require re-running affected models per BENCHMARK_GOVERNANCE.md.

benchmark:
  id: snatchphasebench-v1
  version: "1.0.0"
  protocol_version: protocol-v1.0-draft
  stats_version: stats-v1.0-draft

dataset:
  version: ds-v1.0
  frame_labels_file: master_frame_labels.csv
  frame_label_rows: 35825
  videos: 208
  athletes: 70
  tensor_checksums:
    X_sha256: 8497a69a2c6d80f24c0fc6242500aa931ab2c00e8172b534a98f86d92ed698b4
    y_sha256: 0175c1c314fd22fef37d4b16a96b038d4643765c323c8b13599ff9a9b17c3546
  windows: 21249

ontology:
  canonical: configs/ontology/seven_phase_v1.yaml
  b0: configs/ontology/five_phase_knee_angle_v1.yaml
  mapping_b0: configs/ontology/seven_to_five_knee_angle_v1.yaml

split:
  version: athlete_split_v1
  file: athlete_split.json
  train_athletes: 49
  val_athletes: 10
  test_athletes: 11

preprocessing:
  version: preprocess-v1.0
  window_size: 31
  stride: 1
  features_per_frame: 99
  pose_extractor: mediapipe
  pose_version: "0.10.30"
  pose_model: full

baselines:
  B0:
    status: frozen_exploratory_reference
    role: exploratory_only
    config: null
    ontology: five_phase_knee_angle_v1
    policy: docs/benchmark/B0_EXPLORATORY_REFERENCE.md
    implementation: none
  B1:
    status: verified
    version: B1-repro-v1
    config: configs/baseline_lstm.yaml
    ontology: seven_phase_v1
    checkpoint_sha256_prefix: ea5ff9ca

evaluation:
  version: eval-v1.1.0
  segment_interval_convention: half_open
  ignored_label_names:
    - unlabeled
  primary_metrics:
    - boundary_mae_frames
    - segmental_f1_at_50
    - edit_score
  secondary_metrics:
    - frame_accuracy
    - segmental_f1_at_10
    - segmental_f1_at_25
    - window_accuracy
    - boundary_mae_ms
  segment_iou_thresholds: [0.10, 0.25, 0.50]
  boundary_tolerances_frames: [1, 2, 3]
  fps_policy: explicit_required_for_ms
  aggregation_policy:
    segment_f1: macro_over_videos
    boundary_mae_frames: micro_and_macro_over_transitions
    boundary_counts: micro_over_dataset

seeds: [42, 123, 456]

learned_models:
  ms_tcn:
    status: implemented
    config: configs/benchmark/ms_tcn.yaml
    registry_name: ms_tcn
    ontology: seven_phase_v1
    input_layout: frame_sequence
  ms_tcn_pp:
    status: planned
    config: configs/benchmark/ms_tcn_pp.yaml
    registry_name: ms_tcn_pp
    ontology: seven_phase_v1
    input_layout: frame_sequence
  asformer:
    status: planned
    config: configs/benchmark/asformer.yaml
    registry_name: asformer
    ontology: seven_phase_v1
    input_layout: frame_sequence

tiers:
  - id: B0
    role: exploratory_reference
    description: Knee-angle event vocabulary (frozen; not implemented)
  - id: B1
    role: reproduction_reference
    description: Frozen thesis LSTM (verified)
  - id: B2
    role: primary_comparator
    description: MS-TCN, MS-TCN++, ASFormer (learned TAS)
  - id: B3
    role: optional_extension
    description: Optional foundation-model encoders
